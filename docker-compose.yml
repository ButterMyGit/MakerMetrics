services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: buttermygit/makermetrics:dashboard-v0.1.0-beta
    container_name: makermetrics-dashboard
    command: ["streamlit", "run", "app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      FIREBASE_CREDENTIALS: /run/secrets
      WATCH_DIR: /app/data/watch
      PAIR_WAIT_SECONDS: ${PAIR_WAIT_SECONDS:-30}
      SALES_COLLECTION: ${SALES_COLLECTION:-sales}
      LISTINGS_COLLECTION: ${LISTINGS_COLLECTION:-listings}
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./data/watch:/app/data/watch
      - ./settings:/app/settings
      - ./secrets:/app/secrets
      - ./secrets:/run/secrets:ro
    ports:
      - "8501:8501"
    restart: unless-stopped

  watcher:
    build:
      context: .
      dockerfile: Dockerfile
    image: buttermygit/makermetrics:watcher-v0.1.0-beta
    container_name: makermetrics-watcher
    command: ["python", "watcher.py"]
    environment:
      FIREBASE_CREDENTIALS: /run/secrets
      WATCH_DIR: /app/data/watch
      PAIR_WAIT_SECONDS: ${PAIR_WAIT_SECONDS:-30}
      SALES_COLLECTION: ${SALES_COLLECTION:-sales}
      LISTINGS_COLLECTION: ${LISTINGS_COLLECTION:-listings}
    volumes:
      - ./data/watch:/app/data/watch
      - ./secrets:/run/secrets:ro
    restart: unless-stopped
